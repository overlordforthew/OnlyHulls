name: Scrape Boat Listings

on:
  # Run daily at 6pm Trinidad time (UTC-4) = 22:00 UTC
  # Well before 8:30pm Starlink cutoff
  schedule:
    - cron: '0 22 * * *'

  # Manual trigger with optional limit override
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of boats to scrape'
        default: '30'
        required: false

jobs:
  scrape:
    name: Scrape boats.com
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Scrapling
        run: pip install "scrapling[all]"

      - name: Install Chromium (for StealthyFetcher)
        run: patchright install chromium --with-deps

      - name: Scrape boats.com
        run: |
          LIMIT="${{ github.event.inputs.limit || '30' }}"
          echo "Scraping $LIMIT boats..."
          python scraper/scrape_boats_com.py "$LIMIT"

      - name: Show results summary
        run: |
          python - <<'EOF'
          import json, sys
          try:
              with open("scraped_boats.json") as f:
                  boats = json.load(f)
              print(f"Total boats scraped: {len(boats)}")
              for i, b in enumerate(boats[:10]):
                  name = b.get('name', 'Unknown')
                  year = b.get('year', '?')
                  price = b.get('price', 'N/A')
                  loc = b.get('location', '?')
                  imgs = len(b.get('images', []))
                  print(f"  {i+1}. {year} {name} | {price} | {loc} | {imgs} photos")
          except Exception as e:
              print(f"Error reading results: {e}")
              sys.exit(1)
          EOF

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraped-boats-${{ github.run_id }}
          path: scraped_boats.json
          retention-days: 90

      - name: POST to webhook (if configured)
        env:
          WEBHOOK_URL: ${{ secrets.SCRAPE_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.SCRAPE_WEBHOOK_SECRET }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "No SCRAPE_WEBHOOK_URL secret set — skipping webhook"
            exit 0
          fi
          echo "POSTing results to webhook..."
          HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $WEBHOOK_SECRET" \
            --data @scraped_boats.json)
          echo "Webhook response: $HTTP_STATUS"
