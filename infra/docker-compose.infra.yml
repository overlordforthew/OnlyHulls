version: "3.8"

services:
  onlyhulls-db:
    image: pgvector/pgvector:pg17
    container_name: onlyhulls-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: onlyhulls
      POSTGRES_USER: onlyhulls
      POSTGRES_PASSWORD: ${ONLYHULLS_DB_PASSWORD:-changeme}
    volumes:
      - onlyhulls-db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onlyhulls"]
      interval: 10s
      timeout: 5s
      retries: 5

  onlyhulls-meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: onlyhulls-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-changeme_meili_master_key}
      MEILI_ENV: production
    volumes:
      - onlyhulls-meili-data:/meili_data
    ports:
      - "127.0.0.1:7701:7700"
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  onlyhulls-redis:
    image: redis:7-alpine
    container_name: onlyhulls-redis
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - onlyhulls-redis-data:/data
    ports:
      - "127.0.0.1:6380:6379"
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  onlyhulls-db-data:
  onlyhulls-meili-data:
  onlyhulls-redis-data:

networks:
  coolify:
    external: true
